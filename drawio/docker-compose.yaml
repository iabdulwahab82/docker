#This compose file adds draw.io to your stack
version: '3.5'
services:
  drawio:
    image: jgraph/drawio
    container_name: drawio
    restart: unless-stopped
    ports:
      - 8382:8080
      - 12443:8443
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://192.168.8.120:8382 || exit 1"]
      interval: 1m30s
      timeout: 10s
      retries: 5
      start_period: 10s
      